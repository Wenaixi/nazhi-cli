# nazhi-cli CI 工作流
#
# 触发条件:
#   - push / PR → main 分支: 检测 + 单元测试 + 跨平台构建
#   - tag v*: 检测 + 测试 + 构建 + 集成测试 + GitHub Release
#   - 手动触发 (workflow_dispatch)
#
# 关键设计:
#   - 检测 (check) 和跨平台构建 (build) 并行，最大化 CI 速度
#   - 集成测试只在 tag 发布时跑（保护真实凭据）
#   - 每个平台用 native runner（onnxruntime_go 强制 CGO）

name: CI

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      run_integration:
        description: "运行真实环境集成测试（需要 secrets）"
        required: false
        default: "false"
        type: choice
        options:
          - "false"
          - "true"

env:
  GO_VERSION: "1.26"

jobs:
  # ─── 1. 代码质量 + 单元测试 ─────────────────────
  check:
    name: "检测 & 单元测试"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: 缓存 golangci-lint
        uses: actions/cache@v4
        with:
          path: ~/.cache/golangci-lint
          key: golangci-lint-${{ runner.os }}

      - name: 验证 go.mod 整洁
        run: go mod tidy && git diff --exit-code go.mod go.sum

      - name: golangci-lint
        uses: golangci/golangci-lint-action@v6
        with:
          # v1.64.8 用 Go 1.24 构建，无法解析 go.mod 的 1.26.1 语法；
          # v2.x 系列用 Go 1.23+ 构建并支持 Go 1.26 target。
          version: v2.1.6
          args: --timeout=5m ./...

      - name: go vet
        run: go vet ./...

      - name: gofmt 检查
        run: |
          if [ "$(gofmt -l . | wc -l)" -gt 0 ]; then
            echo "以下文件未格式化:"
            gofmt -l .
            exit 1
          fi

      - name: 单元测试（race 检测）
        run: go test -count=1 -race -v ./pkg/...

      - name: 集成测试编译验证（不跑真实环境）
        run: go test -tags=integration -run=^$ ./test/integration/...

  # ─── 2. 跨平台构建（5 平台）─────────────────────
  build:
    name: "构建 ${{ matrix.name }}"
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Linux (amd64)
            runner: ubuntu-latest
            goos: linux
            goarch: amd64
            ext: ""
            cgo: "1"
          - name: Linux (arm64)
            runner: ubuntu-22.04-arm64
            goos: linux
            goarch: arm64
            ext: ""
            cgo: "1"
          - name: macOS (arm64)
            runner: macos-latest
            goos: darwin
            goarch: arm64
            ext: ""
            cgo: "1"
          - name: Windows (amd64)
            runner: windows-latest
            goos: windows
            goarch: amd64
            ext: ".exe"
            # onnxruntime_go 强制 CGO → Windows 也需要 CGO_ENABLED=1
            # windows-latest 默认已装 MinGW gcc
            cgo: "1"
          - name: Windows (arm64)
            runner: windows-11-arm
            goos: windows
            goarch: arm64
            ext: ".exe"
            cgo: "1"
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: 读取版本号
        id: version
        run: |
          # 仅匹配 var Version = "x.y.z" 定义行（排除注释里的 Version 字样）
          VER=$(grep -E '^\s*var\s+Version\s*=' internal/version/version.go \
                | head -1 \
                | sed -E 's/.*"([^"]+)".*/\1/')
          if [ -z "$VER" ]; then
            echo "::error::无法从 internal/version/version.go 解析版本号"
            exit 1
          fi
          echo "version=$VER" >> "$GITHUB_OUTPUT"
          echo "构建 nazhi v$VER — ${{ matrix.goos }}/${{ matrix.goarch }}"

      - name: 编译
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: ${{ matrix.cgo }}
        run: |
          mkdir -p bin
          go build -ldflags="-s -w" \
            -o "bin/nazhi-${{ matrix.goos }}-${{ matrix.goarch }}${{ matrix.ext }}" \
            ./cmd/nazhi

      - name: 验证二进制可执行
        run: |
          if [ "${{ matrix.goos }}" = "windows" ]; then
            ./bin/nazhi-${{ matrix.goos }}-${{ matrix.goarch }}${{ matrix.ext }} --version
          else
            chmod +x ./bin/nazhi-${{ matrix.goos }}-${{ matrix.goarch }}${{ matrix.ext }}
            ./bin/nazhi-${{ matrix.goos }}-${{ matrix.goarch }}${{ matrix.ext }} --version
          fi

      - name: 压缩产物
        uses: actions/upload-artifact@v4
        with:
          name: nazhi-${{ steps.version.outputs.version }}-${{ matrix.goos }}-${{ matrix.goarch }}
          path: bin/nazhi-${{ matrix.goos }}-${{ matrix.goarch }}${{ matrix.ext }}
          if-no-files-found: error

  # ─── 3. 集成测试（仅 tag + 手动触发）───────────
  integration:
    name: "真实环境集成测试"
    if: ${{ startsWith(github.ref, 'refs/tags/v') || (github.event_name == 'workflow_dispatch' && inputs.run_integration == 'true') }}
    needs: [check]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: 真实环境集成测试
        env:
          NAZHI_USERNAME: ${{ secrets.NAZHI_USERNAME }}
          NAZHI_PASSWORD: ${{ secrets.NAZHI_PASSWORD }}
        run: |
          if [ -z "$NAZHI_USERNAME" ] || [ -z "$NAZHI_PASSWORD" ]; then
            echo "::warning::NAZHI_USERNAME 或 NAZHI_PASSWORD secret 未设置，跳过"
            exit 0
          fi
          go test -tags=integration -count=1 -race -v -timeout=180s ./test/integration/...

  # ─── 4. Release（仅 tag v*）─────────────────────
  release:
    name: "发布 Release"
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [build, integration]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: 下载所有构建产物
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: 准备发布文件
        run: |
          mkdir -p release
          for dir in artifacts/*/; do
            name=$(basename "$dir")
            file=$(ls "$dir")
            cp "$dir/$file" "release/$file"
          done
          ls -lh release/

      - name: 生成 SHA256 校验和
        run: |
          cd release
          sha256sum * > SHA256SUMS
          cat SHA256SUMS

      - name: 创建 Release
        uses: softprops/action-gh-release@v2
        with:
          name: nazhi ${{ github.ref_name }}
          body: |
            ## nazhi-cli ${{ github.ref_name }}

            请查看 [CHANGELOG.md](../../blob/main/CHANGELOG.md) 了解更新详情。

            ### 安装

            下载对应平台的二进制文件即可使用。详细安装说明见 [README](../../blob/main/README.md)。

            ### 校验

            使用 SHA256SUMS 校验下载文件完整性。
          fail_on_unmatched_files: false
          files: |
            release/*
            release/SHA256SUMS
